<title>JustHot — Social Preview Banner</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1280px;
    height: 640px;
    overflow: hidden;
    background: #0f1014;
  }

  body {
    font-family: 'Helvetica Neue', 'Arial', 'Liberation Sans', system-ui, sans-serif;
  }

  .canvas {
    width: 1280px;
    height: 640px;
    position: relative;
    overflow: hidden;
    background: #0f1014;
  }

  /* Fine grain — adds materiality, breaks mathematical flatness */
  .grain {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 50;
  }

  /* Subtle warm vignette — left/top/bottom corners only, keeps right zone open for logo */
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 120% 140% at 28% 50%, transparent 42%, rgba(0,0,0,0.45) 100%);
    pointer-events: none;
    z-index: 3;
  }

  /* Orange hairline at top — earned, structural */
  .top-rule {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1.5px;
    background: linear-gradient(90deg,
      #ff7a00 0%,
      rgba(255,122,0,0.5) 14%,
      rgba(255,122,0,0.08) 40%,
      transparent 62%
    );
    z-index: 10;
  }

  /* TOP RIGHT: small flame icon + version */
  .top-right {
    position: absolute;
    top: 44px;
    right: 80px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 12px;
  }

  .version-tag {
    font-family: ui-monospace, 'Cascadia Code', 'Consolas', monospace;
    font-size: 11px;
    color: #2a2520;
    letter-spacing: 0.1em;
  }

  /* MAIN TYPE BLOCK — left, vertically centered */
  .type-block {
    position: absolute;
    left: 80px;
    top: 200px;
    z-index: 20;
  }

  .eyebrow {
    font-family: ui-monospace, 'Cascadia Code', 'Consolas', monospace;
    font-size: 11.5px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #848078;
    margin-bottom: 18px;
  }

  /* 126px — dominates the canvas intentionally */
  .wordmark {
    font-size: 126px;
    font-weight: 800;
    line-height: 0.9;
    letter-spacing: -0.048em;
    color: #ede8e2;
    margin-bottom: 30px;
  }

  .wordmark .hot {
    color: #ff7a00;
  }

  /* Descriptor — 20px, 5:1+ ratio below the 126px wordmark */
  .descriptor {
    font-size: 20px;
    font-weight: 400;
    color: #908880;
    line-height: 1.6;
    letter-spacing: 0.012em;
  }

  /* RIGHT VISUAL: actual product logo — fully inside canvas */
  .right-visual {
    position: absolute;
    right: 88px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 5;
    pointer-events: none;
  }

  .logo-img {
    width: 360px;
    height: 360px;
    display: block;
    filter: drop-shadow(0 0 48px rgba(255,122,0,0.22)) drop-shadow(0 20px 40px rgba(0,0,0,0.6));
  }

  /* BOTTOM BAR */
  .bottom-bar {
    position: absolute;
    bottom: 38px;
    left: 80px;
    right: 80px;
    z-index: 20;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .stat-line {
    font-family: ui-monospace, 'Cascadia Code', 'Consolas', monospace;
    font-size: 12px;
    color: #38332e;
    letter-spacing: 0.09em;
  }

  .company-line {
    font-size: 10.5px;
    color: #1e1b18;
    letter-spacing: 0.05em;
  }
</style>
